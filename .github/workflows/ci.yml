# CI: сначала тесты, затем сборка Windows (папка, не один exe)

name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Зависимости
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Тесты
        run: pytest tests/ -q --tb=short

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Зависимости + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Сборка onedir (папка)
        shell: pwsh
        run: |
          ./build_windows.ps1

      - name: Артефакт папки
        uses: actions/upload-artifact@v4
        with:
          name: AnalizOperacii-Windows
          path: dist/AnalizOperacii/
